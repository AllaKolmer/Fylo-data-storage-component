<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fylo data storage</title>
    <link rel="stylesheet" href="fylo.css">
</head>
<body>
    <main>
        <div class="blockleft">
            <div class="firstblok">
                <img src="logo.svg" alt="logo" class="logo">
                <div class="icons-box">
                    <div class="iconone">
                        <img src="icon-document.svg" alt="fileicon">
                    </div>

                    <div class="icontwo">
                        <img src="icon-folder.svg" alt="foldericon">
                    </div>

                    <div class="iconthree">
                        <img src="icon-upload.svg" alt="downloadicon">
                    </div>
                </div>
            </div>
        </div>

        <div class="blockright">
            <div class="secondblock">
                <div>
                    <p>You’ve used <b>815 GB</b> of your storage</p>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill">
                        <div class="circle">
                        </div>
                    </div>
                </div>
                <div class="size">
                    <span>0 GB</span>
                    <span>1000 GB</span>
                </div>
                <div class="storage-left">
                    <span class="large">185</span>
                    <span class="small">GB Left</span>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
